# ──────────────────────────────────────────────────────────────────────────
# To'liq standalone server (agar api.medora.ziyrak.org subdomain bo'lsa):
server {
    listen 443 ssl http2;
    server_name medora.ziyrak.org;

    ssl_certificate     /etc/letsencrypt/live/medora.ziyrak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medora.ziyrak.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "DENY"                                always;

    client_max_body_size 20M;

    # API proxy
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    180s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_buffering       off;
    }

    # Django Admin
    location /admin/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Static files
    location /static/ {
        alias   /var/www/medoraai/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias   /var/www/medoraai/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Health check
    location /health/ {
        proxy_pass   http://127.0.0.1:8000/health/;
        access_log   off;
    }

    # Swagger/ReDoc (production'da ixtiyoriy)
    location ~ ^/(swagger|redoc)/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend SPA (agar frontend va backend bir serverda bo'lsa)
    root  /var/www/medoraai/dist;
    location / {
        try_files $uri $uri/ /index.html;
    }
}
