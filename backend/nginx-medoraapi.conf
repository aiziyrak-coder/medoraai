# API so'rovlarini medora.ziyrak.org/api/ ga yo'naltirish uchun
# nginx-medora.conf serveri ichiga quyidagi blokni qo'shing,
# yoki alohida server sifatida ishlatish mumkin.

# Bu fayl medora.ziyrak.org/api/* so'rovlarini handle qiladi.
# nginx-medora.conf dagi server{} bloki ichida include qiling:
#   include /etc/nginx/conf.d/medoraapi-location.conf;
# yoki pastdagi location blokni medora.ziyrak.org HTTPS serveriga qo'shing.

