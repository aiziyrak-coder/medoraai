# ================================================================
# Nginx — medoraapi.ziyrak.org  (Backend Django API)
# Server IP: 20.82.115.71
# Gunicorn: 127.0.0.1:8000
# ================================================================

server {
    listen 80;
    server_name medoraapi.ziyrak.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name medoraapi.ziyrak.org;

    # SSL (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/medoraapi.ziyrak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medoraapi.ziyrak.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;

    client_max_body_size 20M;

    # API proxy → Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    180s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_buffering       off;
    }

    # Static fayllar (Django collectstatic)
    location /static/ {
        alias   /home/cdcgroup/medora_platform/app/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media fayllar (upload)
    location /media/ {
        alias   /home/cdcgroup/medora_platform/app/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Health check
    location /health/ {
        proxy_pass http://127.0.0.1:8000/health/;
        access_log off;
    }
}
