# ================================================================
# Nginx — HTTPS: medora.ziyrak.org + medoraapi.ziyrak.org
# Server: 20.82.115.71 | Let's Encrypt
# ================================================================

# ---------- Frontend: medora.ziyrak.org ----------
server {
    listen 80;
    server_name medora.ziyrak.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name medora.ziyrak.org;

    ssl_certificate     /etc/letsencrypt/live/medora.ziyrak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medora.ziyrak.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root  /home/cdcgroup/medora_platform/app/dist;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    location /assets/ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    location ~* \.(webmanifest|ico|png|svg)$ {
        expires    7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 20M;
}

# ---------- Backend API: medoraapi.ziyrak.org ----------
server {
    listen 80;
    server_name medoraapi.ziyrak.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name medoraapi.ziyrak.org;

    ssl_certificate     /etc/letsencrypt/live/medoraapi.ziyrak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medoraapi.ziyrak.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    client_max_body_size 20M;

    location / {
        add_header Access-Control-Allow-Origin "https://medora.ziyrak.org" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Allow-Credentials "true" always;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    180s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_buffering       off;
    }

    location /static/ {
        alias   /home/cdcgroup/medora_platform/app/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias   /home/cdcgroup/medora_platform/app/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /health/ {
        add_header Access-Control-Allow-Origin "https://medora.ziyrak.org" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
        proxy_pass http://127.0.0.1:8000/health/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }
}
