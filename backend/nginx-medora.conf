# ================================================================
# Nginx — medora.ziyrak.org  (Frontend SPA)
# Server IP: 20.82.115.71
# ================================================================

server {
    listen 80;
    server_name medora.ziyrak.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name medora.ziyrak.org;

    # SSL (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/medora.ziyrak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medora.ziyrak.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # Frontend dist papkasi
    root  /home/cdcgroup/medora_platform/app/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Assets — 1 yil kesh
    location /assets/ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # PWA / favicon
    location ~* \.(webmanifest|ico|png|svg)$ {
        expires    7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 20M;
}
