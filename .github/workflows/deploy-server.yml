# Serverda: git pull + migrate + frontend build + backend restart (deploy/server-deploy.sh)
#
# GitHub → Settings → Secrets and variables → Actions:
#   DEPLOY_HOST     (masalan medora.cdcgroup.uz yoki IP)
#   DEPLOY_USER     (odatda root)
#   DEPLOY_SSH_KEY  (SSH private key, to'liq matn)
#   DEPLOY_PORT     (ixtiyoriy, default 22)
#
# Qo'lda: Actions → Deploy server → Run workflow
# Avtomatik: main ga push (frontend/backend/deploy o'zgarganda) — yuqoridagi secretlar bo'lsa server yangilanadi

name: Deploy server

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'deploy/**'
      - '.github/workflows/deploy-server.yml'

concurrency:
  group: deploy-server
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Git pull va deploy skripti
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            for APP in /root/medoraai /root/AiDoktorai; do
              if [ -f "$APP/deploy/server-deploy.sh" ]; then
                cd "$APP"
                git fetch origin main
                git reset --hard origin/main
                sudo bash deploy/server-deploy.sh
                exit 0
              fi
            done
            echo "XATO: /root/medoraai yoki /root/AiDoktorai ichida deploy/server-deploy.sh topilmadi"
            exit 1
