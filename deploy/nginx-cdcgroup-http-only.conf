# Faqat 80 port — certbot ACME challenge uchun. SSL olingach nginx-cdcgroup.conf ishlatiladi.
# Faqat fjsti.ziyrak.org / fjstiapi.ziyrak.org
server {
    listen 80;
    server_name fjsti.ziyrak.org;
    root /root/medoraai/frontend/dist;
    index index.html;
    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    location = /favicon.ico { log_not_found off; access_log off; return 204; }
    location /.well-known/acme-challenge/ { root /root/medoraai/frontend/dist; }
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
    location ~* \.(webmanifest|ico|png|svg|js|css)$ { expires 7d; add_header Cache-Control "public"; }
    location / { try_files $uri $uri/ /index.html; }
}
server {
    listen 80;
    server_name fjstiapi.ziyrak.org;
    client_max_body_size 20M;
    location /.well-known/acme-challenge/ { root /root/medoraai/frontend/dist; }
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
    location /health/ { proxy_pass http://127.0.0.1:8001/health/; access_log off; }
    location /static/ { alias /root/medoraai/backend/staticfiles/; expires 30d; }
    location /media/  { alias /root/medoraai/backend/media/; expires 7d; }
}
