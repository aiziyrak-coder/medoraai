# MedoraAI HTTPS Configuration
# Frontend: https://medora.cdcgroup.uz
# Backend API: https://medoraapi.cdcgroup.uz

# Frontend - Static files
server {
    listen 443 ssl http2;
    server_name medora.cdcgroup.uz;
    
    ssl_certificate /etc/letsencrypt/live/medora.cdcgroup.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medora.cdcgroup.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    root /root/AiDoktorai/frontend/dist;
    index index.html;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Health check
    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

# Backend API
server {
    listen 443 ssl http2;
    server_name medoraapi.cdcgroup.uz;
    
    ssl_certificate /etc/letsencrypt/live/medoraapi.cdcgroup.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medoraapi.cdcgroup.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 75s;
    }
    
    location /static/ {
        alias /root/AiDoktorai/backend/static/;
    }
    
    location /media/ {
        alias /root/AiDoktorai/backend/media/;
    }
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name medora.cdcgroup.uz medoraapi.cdcgroup.uz;
    return 301 https://$host$request_uri;
}
