# Aidoktor.uz — faqat shu domenlar (boshqa saytlarga tegmaydi).
# Gunicorn: 127.0.0.1:8099  |  Loyiha: /root/aidoktorfjsti
# Sertifikat: certbot --webroot -w /root/aidoktorfjsti/frontend/dist
#   -d aidoktor.uz -d www.aidoktor.uz -d api.aidoktor.uz
# → /etc/letsencrypt/live/aidoktor.uz/

map $http_origin $aidoktorapi_cors_origin {
    default "";
    "https://aidoktor.uz" $http_origin;
    "http://aidoktor.uz"  $http_origin;
    "https://www.aidoktor.uz" $http_origin;
    "~*^https://aidoktor\.uz(:443)?$" $http_origin;
    "~*^http://aidoktor\.uz(:80)?$"  $http_origin;
    "~*^https://www\.aidoktor\.uz(:443)?$" $http_origin;
}

map "$request_method$aidoktorapi_cors_origin" $aidoktorapi_options_preflight_ok {
    default 0;
    "~^OPTIONShttps://aidoktor\.uz(:443)?$" 1;
    "~^OPTIONShttp://aidoktor\.uz(:80)?$" 1;
    "~^OPTIONShttps://www\.aidoktor\.uz(:443)?$" 1;
}

# ---------- HTTP: ACME + HTTPS ga ----------
server {
    listen 80;
    listen [::]:80;
    server_name aidoktor.uz www.aidoktor.uz;
    location ^~ /.well-known/acme-challenge/ {
        root /root/aidoktorfjsti/frontend/dist;
        default_type "text/plain";
        allow all;
    }
    location / {
        return 301 https://aidoktor.uz$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.aidoktor.uz;
    location ^~ /.well-known/acme-challenge/ {
        root /root/aidoktorfjsti/frontend/dist;
        default_type "text/plain";
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS: frontend ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name aidoktor.uz;

    ssl_certificate     /etc/letsencrypt/live/aidoktor.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aidoktor.uz/privkey.pem;
    include /etc/nginx/snippets/ssl-aidoktor-uz.conf;

    root /root/aidoktorfjsti/frontend/dist;
    index index.html;
    charset utf-8;
    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location = /favicon.ico {
        try_files $uri =204;
        log_not_found off;
        access_log off;
    }
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location = /service-worker.js {
        default_type application/javascript;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location = /medora-sw-cleanup.js {
        default_type application/javascript;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
    location ~* \.(webmanifest|ico|png|svg|css)$ { expires 7d; add_header Cache-Control "public"; }

    location /api/ {
        proxy_pass http://127.0.0.1:8099/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
    location /health/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        return 200 '{"status":"healthy","service":"aidoktor-uz"}';
        access_log off;
    }
    location /static/ { alias /root/aidoktorfjsti/backend/staticfiles/; expires 30d; }
    location /media/  { alias /root/aidoktorfjsti/backend/media/; expires 7d; }
    location / { try_files $uri $uri/ /index.html; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.aidoktor.uz;
    ssl_certificate     /etc/letsencrypt/live/aidoktor.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aidoktor.uz/privkey.pem;
    include /etc/nginx/snippets/ssl-aidoktor-uz.conf;
    return 301 https://aidoktor.uz$request_uri;
}

# ---------- HTTPS: API ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.aidoktor.uz;

    ssl_certificate     /etc/letsencrypt/live/aidoktor.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aidoktor.uz/privkey.pem;
    include /etc/nginx/snippets/ssl-aidoktor-uz.conf;

    client_max_body_size 20M;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location ^~ /api/ {
        if ($aidoktorapi_options_preflight_ok = 1) {
            add_header Access-Control-Allow-Origin $aidoktorapi_cors_origin always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Accept, Accept-Encoding, Authorization, Content-Type, DNT, Origin, User-Agent, X-Device-Id, X-Device-Info, X-CSRFToken, X-Requested-With' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }
        proxy_pass http://127.0.0.1:8099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    location / {
        if ($aidoktorapi_options_preflight_ok = 1) {
            add_header Access-Control-Allow-Origin $aidoktorapi_cors_origin always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Accept, Accept-Encoding, Authorization, Content-Type, DNT, Origin, User-Agent, X-Device-Id, X-Device-Info, X-CSRFToken, X-Requested-With' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }
        proxy_pass http://127.0.0.1:8099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
    location /health/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        return 200 '{"status":"healthy","service":"aidoktor-api"}';
        access_log off;
    }
    location /static/ { alias /root/aidoktorfjsti/backend/staticfiles/; expires 30d; }
    location /media/  { alias /root/aidoktorfjsti/backend/media/; expires 7d; }
}
