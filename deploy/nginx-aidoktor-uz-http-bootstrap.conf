# Vaqtincha: Let's Encrypt oldidan — SSL yo'q. Port 80 da ACME + proxy.
# provision-aidoktor-uz.sh TLS dan keyin nginx-aidoktor-uz-ssl.conf bilan almashtiradi.

server {
    listen 80;
    listen [::]:80;
    server_name aidoktor.uz www.aidoktor.uz;
    root /root/aidoktorfjsti/frontend/dist;
    index index.html;
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        allow all;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:8099/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }
    location / { try_files $uri $uri/ /index.html; }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.aidoktor.uz;
    location ^~ /.well-known/acme-challenge/ {
        root /root/aidoktorfjsti/frontend/dist;
        default_type "text/plain";
        allow all;
    }
    location / {
        proxy_pass http://127.0.0.1:8099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }
}
