# MedoraAI — server 167.71.53.238 (IP or domain)
# Backend: 127.0.0.1:8001  |  Frontend: /root/medoraai/frontend/dist
# Qo‘yish: sudo cp deploy/nginx-medoraai-ip.conf /etc/nginx/sites-available/medoraai && sudo ln -sf /etc/nginx/sites-available/medoraai /etc/nginx/sites-enabled/ && sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 167.71.53.238;
    # Agar domen bo‘lsa: server_name medora.ziyrak.org medoraapi.ziyrak.org 167.71.53.238;

    client_max_body_size 20M;

    # API va health — backend (8001)
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
    location /health/ {
        proxy_pass http://127.0.0.1:8001/health/;
        access_log off;
    }
    location /admin/ {
        proxy_pass http://127.0.0.1:8001/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static (Django) — ixtiyoriy
    location /static/ {
        alias /root/medoraai/backend/staticfiles/;
        expires 30d;
    }
    location /media/ {
        alias /root/medoraai/backend/media/;
        expires 7d;
    }

    # Frontend SPA (Vite build: outDir ../dist)
    root /root/medoraai/frontend/dist;
    index index.html;
    charset utf-8;
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
