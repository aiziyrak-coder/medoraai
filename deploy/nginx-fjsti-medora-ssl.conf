# Medora / FJSTI — HTTPS (Let's Encrypt: fjsti.ziyrak.org + fjstiapi bitta sertifikatda)
# Certbot: DEPLOY_CERTBOT_EMAIL bilan deploy_server.py yoki qo'lda:
#   certbot certonly --webroot -w /root/medoraai/frontend/dist \
#     -d fjsti.ziyrak.org -d fjstiapi.ziyrak.org --agree-tos -m email@example.com --non-interactive

# ---------- HTTP: ACME + HTTPS ga yo'naltirish ----------
server {
    listen 80;
    server_name fjsti.ziyrak.org;
    location ^~ /.well-known/acme-challenge/ {
        root /root/medoraai/frontend/dist;
        default_type "text/plain";
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name fjstiapi.ziyrak.org;
    location ^~ /.well-known/acme-challenge/ {
        root /root/medoraai/frontend/dist;
        default_type "text/plain";
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS: frontend ----------
server {
    listen 443 ssl http2;
    server_name fjsti.ziyrak.org;

    ssl_certificate     /etc/letsencrypt/live/fjsti.ziyrak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fjsti.ziyrak.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /root/medoraai/frontend/dist;
    index index.html;
    charset utf-8;
    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    location = /favicon.ico {
        try_files $uri =204;
        log_not_found off;
        access_log off;
    }
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location = /service-worker.js {
        default_type application/javascript;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location = /medora-sw-cleanup.js {
        default_type application/javascript;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
    location ~* \.(webmanifest|ico|png|svg|css)$ { expires 7d; add_header Cache-Control "public"; }

    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
    location /health/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        return 200 '{"status":"healthy","service":"fjsti-medora"}';
        access_log off;
    }
    location /static/ { alias /root/medoraai/backend/staticfiles/; expires 30d; }
    location /media/  { alias /root/medoraai/backend/media/; expires 7d; }
    location / { try_files $uri $uri/ /index.html; }
}

# ---------- HTTPS: API ----------
server {
    listen 443 ssl http2;
    server_name fjstiapi.ziyrak.org;

    ssl_certificate     /etc/letsencrypt/live/fjsti.ziyrak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fjsti.ziyrak.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20M;

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
    location /health/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        return 200 '{"status":"healthy","service":"fjsti-medora-api"}';
        access_log off;
    }
    location /static/ { alias /root/medoraai/backend/staticfiles/; expires 30d; }
    location /media/  { alias /root/medoraai/backend/media/; expires 7d; }
}
