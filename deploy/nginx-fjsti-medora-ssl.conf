# Medora / FJSTI — HTTPS (Let's Encrypt: aidoktor.uz + fjstiapi bitta sertifikatda)
# Certbot: DEPLOY_CERTBOT_EMAIL bilan deploy_server.py yoki qo'lda:
#   certbot certonly --webroot -w /root/medoraai/frontend/dist \
#     -d aidoktor.uz -d api.aidoktor.uz --agree-tos -m email@example.com --non-interactive

# fjstiapi: preflight uchun ruxsat etilgan Origin (aniq qator + regex: port, registr farqi)
map $http_origin $fjstiapi_cors_origin {
    default "";
    "https://aidoktor.uz" $http_origin;
    "http://aidoktor.uz"  $http_origin;
    "~*^https://fjsti\.ziyrak\.org(:443)?$" $http_origin;
    "~*^http://fjsti\.ziyrak\.org(:80)?$"  $http_origin;
}

# OPTIONS ni faqat yuqoridagi Origin tan olinganda nginx javob beradi; bo'sh Origin yoki notanish domen — Django ga
map "$request_method$fjstiapi_cors_origin" $fjstiapi_options_preflight_ok {
    default 0;
    "~^OPTIONShttps://fjsti\.ziyrak\.org(:443)?$" 1;
    "~^OPTIONShttp://fjsti\.ziyrak\.org(:80)?$" 1;
}

# ---------- HTTP: ACME + HTTPS ga yo'naltirish ----------
server {
    listen 80;
    server_name aidoktor.uz;
    location ^~ /.well-known/acme-challenge/ {
        root /root/medoraai/frontend/dist;
        default_type "text/plain";
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name api.aidoktor.uz;
    location ^~ /.well-known/acme-challenge/ {
        root /root/medoraai/frontend/dist;
        default_type "text/plain";
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS: frontend ----------
server {
    listen 443 ssl http2;
    server_name aidoktor.uz;

    ssl_certificate     /etc/letsencrypt/live/aidoktor.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aidoktor.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /root/medoraai/frontend/dist;
    index index.html;
    charset utf-8;
    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    location = /favicon.ico {
        try_files $uri =204;
        log_not_found off;
        access_log off;
    }
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location = /service-worker.js {
        default_type application/javascript;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location = /medora-sw-cleanup.js {
        default_type application/javascript;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
    location ~* \.(webmanifest|ico|png|svg|css)$ { expires 7d; add_header Cache-Control "public"; }

    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
    location /health/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        return 200 '{"status":"healthy","service":"fjsti-medora"}';
        access_log off;
    }
    location /static/ { alias /root/medoraai/backend/staticfiles/; expires 30d; }
    location /media/  { alias /root/medoraai/backend/media/; expires 7d; }
    location / { try_files $uri $uri/ /index.html; }
}

# ---------- HTTPS: API ----------
server {
    listen 443 ssl http2;
    server_name api.aidoktor.uz;

    ssl_certificate     /etc/letsencrypt/live/aidoktor.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aidoktor.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20M;

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    # /api/* — preflight va API (location / dan oldin)
    location ^~ /api/ {
        if ($fjstiapi_options_preflight_ok = 1) {
            add_header Access-Control-Allow-Origin $fjstiapi_cors_origin always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Accept, Accept-Encoding, Authorization, Content-Type, DNT, Origin, User-Agent, X-Device-Id, X-Device-Info, X-CSRFToken, X-Requested-With' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    location / {
        if ($fjstiapi_options_preflight_ok = 1) {
            add_header Access-Control-Allow-Origin $fjstiapi_cors_origin always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Accept, Accept-Encoding, Authorization, Content-Type, DNT, Origin, User-Agent, X-Device-Id, X-Device-Info, X-CSRFToken, X-Requested-With' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
    location /health/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        return 200 '{"status":"healthy","service":"fjsti-medora-api"}';
        access_log off;
    }
    location /static/ { alias /root/medoraai/backend/staticfiles/; expires 30d; }
    location /media/  { alias /root/medoraai/backend/media/; expires 7d; }
}
