# Medora / FJSTI — faqat HTTP :80 (SSL keyin qo'shiladi)
# deploy/deploy_server.py: DEPLOY_FIX_FJSTI_NGINX=1 bilan serverga yoziladi.
#
# fjsti.ziyrak.org boshqa loyiha ochsa: boshqa fayllarda shu server_name bo'lsa,
# skript ularni vaqtincha sites-enabled dan oladi.

server {
    listen 80;
    server_name fjsti.ziyrak.org;

    root /root/medoraai/frontend/dist;
    index index.html;
    charset utf-8;
    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location = /favicon.ico {
        try_files $uri =204;
        log_not_found off;
        access_log off;
    }
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location = /service-worker.js {
        default_type application/javascript;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location = /medora-sw-cleanup.js {
        default_type application/javascript;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
    location ~* \.(webmanifest|ico|png|svg|css)$ { expires 7d; add_header Cache-Control "public"; }

    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
    location /health/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        return 200 '{"status":"healthy","service":"fjsti-medora"}';
        access_log off;
    }
    location /static/ { alias /root/medoraai/backend/staticfiles/; expires 30d; }
    location /media/  { alias /root/medoraai/backend/media/; expires 7d; }
    location / { try_files $uri $uri/ /index.html; }
}

server {
    listen 80;
    server_name fjstiapi.ziyrak.org;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
    location /health/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        return 200 '{"status":"healthy","service":"fjsti-medora-api"}';
        access_log off;
    }
    location /static/ { alias /root/medoraai/backend/staticfiles/; expires 30d; }
    location /media/  { alias /root/medoraai/backend/media/; expires 7d; }
}
