# aidoktor.uz — frontend (SPA) + ixtiyoriy /api/ proxy → 127.0.0.1:8001
# api.aidoktor.uz — backend API (127.0.0.1:8001)
#
# DNS: ikkala domen uchun A yozuv → server IP (masalan 167.71.53.238)
# SSL: certbot --webroot -w /root/medoraai/frontend/dist \
#   -d aidoktor.uz -d api.aidoktor.uz
# Keyin: sudo ln -sf /path/to/this/file /etc/nginx/sites-enabled/fjsti-ziyrak && nginx -t && systemctl reload nginx
#
# MUHIM: Agar aidoktor.uz boshqa loyiha (masalan Tergov AI) ochilsa —
# DNS to'g'ri, lekin nginx da bu domen boshqa server_name yoki default_server blokkida.
# Tekshiruv: sudo nginx -T 2>/dev/null | grep -n server_name | grep -i fjsti
# Faqat bitta HTTPS blokda aidoktor.uz bo'lsin va root /root/medoraai/frontend/dist bo'lsin.

# ---------- Frontend: aidoktor.uz (HTTP → HTTPS) ----------
server {
    listen 80;
    server_name aidoktor.uz;
    location / {
        return 301 https://$host$request_uri;
    }
    location /.well-known/acme-challenge/ {
        root /root/medoraai/frontend/dist;
    }
}

# ---------- Frontend: aidoktor.uz (HTTPS) ----------
server {
    listen 443 ssl http2;
    server_name aidoktor.uz;
    ssl_certificate     /etc/letsencrypt/live/aidoktor.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aidoktor.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /root/medoraai/frontend/dist;
    index index.html;
    charset utf-8;
    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location = /favicon.ico { log_not_found off; access_log off; return 204; }
    # HTML hech qachon uzoq kesh — aks holda yangi buildda index boshqa hashli chunklarni chaqiradi, /assets/*.js 404
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0, proxy-revalidate" always;
    }
    location = /service-worker.js {
        default_type application/javascript;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location = /medora-sw-cleanup.js {
        default_type application/javascript;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
    location ~* \.(webmanifest|ico|png|svg|css)$ { expires 7d; add_header Cache-Control "public"; }

    # Ixtiyoriy: front orqali /api (aks holda brauzer to'g'ridan-to'g'ri fjstiapi dan chaqiradi)
    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host "aidoktor.uz";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_intercept_errors off;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;
        proxy_max_temp_file_size 0;
    }
    location /health/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        return 200 '{"status":"healthy","service":"fjsti-backend"}';
        access_log off;
    }
    location /static/ { alias /root/medoraai/backend/staticfiles/; expires 30d; }
    location /media/  { alias /root/medoraai/backend/media/; expires 7d; }
    # / va SPA marshrutlari — try_files orqali index berilganda ham brauzer eski HTMLni ushlab qolmasin
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0, proxy-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}

# ---------- API: api.aidoktor.uz (HTTP → HTTPS) ----------
server {
    listen 80;
    server_name api.aidoktor.uz;
    location / { return 301 https://$host$request_uri; }
    location /.well-known/acme-challenge/ { root /root/medoraai/frontend/dist; }
}

# ---------- API: api.aidoktor.uz (HTTPS) — Gunicorn 8001 ----------
# HTTP/2 o‘chirilgan: katta JSON javoblarda ba’zi mijozlarda ERR_HTTP2_PROTOCOL_ERROR bo‘lmasligi uchun.
server {
    listen 443 ssl;
    server_name api.aidoktor.uz;
    ssl_certificate     /etc/letsencrypt/live/aidoktor.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aidoktor.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    client_max_body_size 20M;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types application/json application/javascript text/plain text/css application/xml;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;
        proxy_max_temp_file_size 0;
    }
    location /health/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        return 200 '{"status":"healthy","service":"fjsti-backend"}';
        access_log off;
    }
    location /static/ { alias /root/medoraai/backend/staticfiles/; expires 30d; }
    location /media/  { alias /root/medoraai/backend/media/; expires 7d; }
}
