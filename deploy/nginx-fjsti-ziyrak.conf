# fjsti.ziyrak.org — frontend (SPA) + ixtiyoriy /api/ proxy → 127.0.0.1:8001
# fjstiapi.ziyrak.org — backend API (127.0.0.1:8001)
#
# DNS: ikkala domen uchun A yozuv → server IP (masalan 167.71.53.238)
# SSL: certbot --webroot -w /root/medoraai/frontend/dist \
#   -d fjsti.ziyrak.org -d fjstiapi.ziyrak.org
# Keyin: sudo ln -sf /path/to/this/file /etc/nginx/sites-enabled/fjsti-ziyrak && nginx -t && systemctl reload nginx

# ---------- Frontend: fjsti.ziyrak.org (HTTP → HTTPS) ----------
server {
    listen 80;
    server_name fjsti.ziyrak.org;
    location / {
        return 301 https://$host$request_uri;
    }
    location /.well-known/acme-challenge/ {
        root /root/medoraai/frontend/dist;
    }
}

# ---------- Frontend: fjsti.ziyrak.org (HTTPS) ----------
server {
    listen 443 ssl http2;
    server_name fjsti.ziyrak.org;
    ssl_certificate     /etc/letsencrypt/live/fjsti.ziyrak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fjsti.ziyrak.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /root/medoraai/frontend/dist;
    index index.html;
    charset utf-8;
    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location = /favicon.ico { log_not_found off; access_log off; return 204; }
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location = /service-worker.js {
        default_type application/javascript;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location = /medora-sw-cleanup.js {
        default_type application/javascript;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
    location ~* \.(webmanifest|ico|png|svg|css)$ { expires 7d; add_header Cache-Control "public"; }

    # Ixtiyoriy: front orqali /api (aks holda brauzer to'g'ridan-to'g'ri fjstiapi dan chaqiradi)
    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host "fjsti.ziyrak.org";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_intercept_errors off;
    }
    location /health/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        return 200 '{"status":"healthy","service":"fjsti-backend"}';
        access_log off;
    }
    location /static/ { alias /root/medoraai/backend/staticfiles/; expires 30d; }
    location /media/  { alias /root/medoraai/backend/media/; expires 7d; }
    location / { try_files $uri $uri/ /index.html; }
}

# ---------- API: fjstiapi.ziyrak.org (HTTP → HTTPS) ----------
server {
    listen 80;
    server_name fjstiapi.ziyrak.org;
    location / { return 301 https://$host$request_uri; }
    location /.well-known/acme-challenge/ { root /root/medoraai/frontend/dist; }
}

# ---------- API: fjstiapi.ziyrak.org (HTTPS) — Gunicorn 8001 ----------
server {
    listen 443 ssl http2;
    server_name fjstiapi.ziyrak.org;
    ssl_certificate     /etc/letsencrypt/live/fjsti.ziyrak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fjsti.ziyrak.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
    location /health/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        return 200 '{"status":"healthy","service":"fjsti-backend"}';
        access_log off;
    }
    location /static/ { alias /root/medoraai/backend/staticfiles/; expires 30d; }
    location /media/  { alias /root/medoraai/backend/media/; expires 7d; }
}
