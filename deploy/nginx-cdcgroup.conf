# medora.cdcgroup.uz — frontend (SPA) + /api/ → 127.0.0.1:8001
# medoraai.cdcgroup.uz, medoraapi.cdcgroup.uz — backend API (127.0.0.1:8001)
# SSL: certbot --webroot -w /root/medoraai/frontend/dist -d medora.cdcgroup.uz -d medoraai.cdcgroup.uz -d medoraapi.cdcgroup.uz

# ---------- Frontend: medora.cdcgroup.uz (HTTP → HTTPS redirect) ----------
server {
    listen 80;
    server_name medora.cdcgroup.uz;
    location / {
        return 301 https://$host$request_uri;
    }
    location /.well-known/acme-challenge/ {
        root /root/medoraai/frontend/dist;
    }
}

# ---------- Frontend: medora.cdcgroup.uz (HTTPS) ----------
# MUHIM (bir serverda bir nechta sayt): default_server QO‘YMASLIK kerak — aks holda boshqa
# domenlar (masalan ilmiyfaoliyat.uz) uchun SNI/noto‘g‘ri konfiguratsiyada barcha HTTPS
# trafik bu blokka tushadi. Har bir loyiha o‘z server_name bilan alohida faylda bo‘lsin.
server {
    listen 443 ssl http2;
    server_name medora.cdcgroup.uz;
    ssl_certificate     /etc/letsencrypt/live/medora.cdcgroup.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medora.cdcgroup.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /root/medoraai/frontend/dist;
    index index.html;
    charset utf-8;
    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location = /favicon.ico { log_not_found off; access_log off; return 204; }
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
    location ~* \.(webmanifest|ico|png|svg|js|css)$ { expires 7d; add_header Cache-Control "public"; }
    # API va health — bitta domen orqali (medoraai.cdcgroup.uz DNS kerak emas)
    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host "medora.cdcgroup.uz";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_intercept_errors off;
    }
    # Health: nginx o'zi 200 qaytaradi (backendga so'rov ketmaydi)
    location /health/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        return 200 '{"status":"healthy","service":"medoraai-backend"}';
        access_log off;
    }
    location /static/ { alias /root/medoraai/backend/staticfiles/; expires 30d; }
    location /media/  { alias /root/medoraai/backend/media/; expires 7d; }
    location / { try_files $uri $uri/ /index.html; }
}

# ---------- Backend: medoraai.cdcgroup.uz, medoraapi.cdcgroup.uz (HTTP → HTTPS) ----------
server {
    listen 80;
    server_name medoraai.cdcgroup.uz medoraapi.cdcgroup.uz;
    location / { return 301 https://$host$request_uri; }
    location /.well-known/acme-challenge/ { root /root/medoraai/frontend/dist; }
}

