# medora.cdcgroup.uz — frontend (SPA)
# medoraai.cdcgroup.uz — backend API (127.0.0.1:8001)
# Backend 8001 da; frontend build VITE_API_BASE_URL=https://medoraai.cdcgroup.uz/api bilan qilinadi.

# Frontend: medora.cdcgroup.uz
server {
    listen 80;
    server_name medora.cdcgroup.uz;
    root /root/medoraai/dist;
    index index.html;
    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Favicon 404 o‘rniga 204 (brauzer avtomatik so‘raydi)
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        return 204;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.(webmanifest|ico|png|svg|js|css)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Backend API: medoraai.cdcgroup.uz
server {
    listen 80;
    server_name medoraai.cdcgroup.uz;
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
    location /health/ {
        proxy_pass http://127.0.0.1:8001/health/;
        access_log off;
    }
    location /static/ {
        alias /root/medoraai/backend/staticfiles/;
        expires 30d;
    }
    location /media/ {
        alias /root/medoraai/backend/media/;
        expires 7d;
    }
}
